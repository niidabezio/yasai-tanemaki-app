<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">やさいばたけ</title>
  <desc id="desc">トマト、キュウリ、ナス、ニンジン、キャベツ、イチゴが並ぶ明るい野菜畑のイラスト</desc>

  <defs>
    <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78cfff"/>
      <stop offset="100%" stop-color="#c9f0ff"/>
    </linearGradient>

    <linearGradient id="groundGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#75bd4d"/>
      <stop offset="100%" stop-color="#3f7f2d"/>
    </linearGradient>

    <radialGradient id="tomatoGradient" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff7f6f"/>
      <stop offset="58%" stop-color="#ec2f28"/>
      <stop offset="100%" stop-color="#a71418"/>
    </radialGradient>

    <linearGradient id="cucumberGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8e85f"/>
      <stop offset="45%" stop-color="#34a853"/>
      <stop offset="100%" stop-color="#137337"/>
    </linearGradient>

    <radialGradient id="eggplantGradient" cx="34%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#b56aff"/>
      <stop offset="54%" stop-color="#7630b8"/>
      <stop offset="100%" stop-color="#3c176f"/>
    </radialGradient>

    <linearGradient id="carrotGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffbd4a"/>
      <stop offset="62%" stop-color="#f47b20"/>
      <stop offset="100%" stop-color="#c34e12"/>
    </linearGradient>

    <radialGradient id="cabbageGradient" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#d9ff9a"/>
      <stop offset="48%" stop-color="#86c85e"/>
      <stop offset="100%" stop-color="#4b8a3e"/>
    </radialGradient>

    <radialGradient id="strawberryGradient" cx="35%" cy="25%" r="78%">
      <stop offset="0%" stop-color="#ff7c7f"/>
      <stop offset="55%" stop-color="#ef2b3a"/>
      <stop offset="100%" stop-color="#ae1224"/>
    </radialGradient>

    <linearGradient id="leafGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79d84d"/>
      <stop offset="100%" stop-color="#218539"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#246018" flood-opacity="0.28"/>
    </filter>

    <style>
      .label {
        font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #24512b;
        text-anchor: middle;
      }
      .title-text {
        font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        font-size: 42px;
        font-weight: 800;
        fill: #2c7836;
        text-anchor: middle;
      }
      .stem {
        stroke: #2f7f35;
        stroke-width: 5;
        stroke-linecap: round;
      }
      .seed {
        fill: #ffd56d;
        opacity: 0.9;
      }
    </style>
  </defs>

  <rect width="900" height="500" fill="url(#skyGradient)"/>

  <circle cx="807" cy="78" r="44" fill="#ffd84c"/>
  <g stroke="#ffd84c" stroke-width="7" stroke-linecap="round">
    <line x1="807" y1="12" x2="807" y2="0"/>
    <line x1="807" y1="144" x2="807" y2="160"/>
    <line x1="741" y1="78" x2="725" y2="78"/>
    <line x1="873" y1="78" x2="890" y2="78"/>
    <line x1="760" y1="31" x2="748" y2="19"/>
    <line x1="854" y1="125" x2="866" y2="137"/>
    <line x1="854" y1="31" x2="866" y2="19"/>
    <line x1="760" y1="125" x2="748" y2="137"/>
  </g>
  <circle cx="791" cy="66" r="8" fill="#fff4a8" opacity="0.75"/>

  <g opacity="0.85" fill="#ffffff">
    <ellipse cx="140" cy="88" rx="48" ry="19"/>
    <ellipse cx="180" cy="82" rx="40" ry="22"/>
    <ellipse cx="218" cy="90" rx="48" ry="18"/>
    <ellipse cx="476" cy="118" rx="55" ry="19"/>
    <ellipse cx="523" cy="111" rx="42" ry="22"/>
    <ellipse cx="562" cy="120" rx="50" ry="17"/>
  </g>

  <g>
    <rect x="253" y="20" width="394" height="72" rx="26" fill="#fff6b7" stroke="#f3c64c" stroke-width="5"/>
    <circle cx="281" cy="56" r="12" fill="#83c653"/>
    <circle cx="619" cy="56" r="12" fill="#83c653"/>
    <text x="450" y="69" class="title-text">🌱 やさいばたけ</text>
  </g>

  <path d="M0 350 C105 324 169 371 271 347 C367 324 438 364 538 341 C657 314 741 356 900 331 L900 500 L0 500 Z" fill="url(#groundGradient)"/>
  <path d="M0 374 C130 352 216 386 337 366 C490 340 579 385 704 358 C781 342 836 348 900 335" fill="none" stroke="#8ed060" stroke-width="8" opacity="0.65"/>
  <g opacity="0.38" stroke="#356f28" stroke-width="3" stroke-linecap="round">
    <line x1="56" y1="412" x2="76" y2="396"/>
    <line x1="104" y1="441" x2="122" y2="420"/>
    <line x1="223" y1="418" x2="240" y2="398"/>
    <line x1="331" y1="448" x2="351" y2="426"/>
    <line x1="488" y1="421" x2="505" y2="397"/>
    <line x1="637" y1="446" x2="660" y2="424"/>
    <line x1="789" y1="414" x2="810" y2="393"/>
    <line x1="842" y1="455" x2="860" y2="432"/>
  </g>

  <!-- Tomato -->
  <g transform="translate(108 203)" filter="url(#softShadow)">
    <line class="stem" x1="42" y1="32" x2="42" y2="126"/>
    <circle cx="42" cy="60" r="48" fill="url(#tomatoGradient)"/>
    <path d="M42 9 L51 35 L77 24 L59 47 L82 57 L54 58 L62 85 L42 66 L22 85 L30 58 L2 57 L25 47 L7 24 L33 35 Z" fill="url(#leafGradient)"/>
    <ellipse cx="25" cy="42" rx="11" ry="17" fill="#ffaaa1" opacity="0.45"/>
    <text x="42" y="174" class="label">トマト</text>
  </g>

  <!-- Cucumber -->
  <g transform="translate(238 217)" filter="url(#softShadow)">
    <line class="stem" x1="55" y1="24" x2="55" y2="112"/>
    <rect x="12" y="33" width="92" height="42" rx="21" fill="url(#cucumberGradient)" transform="rotate(-10 58 54)"/>
    <path d="M25 43 C46 32 78 31 99 45" fill="none" stroke="#d6ff8f" stroke-width="5" stroke-linecap="round" opacity="0.72" transform="rotate(-10 58 54)"/>
    <g fill="#e3ffc0" opacity="0.9" transform="rotate(-10 58 54)">
      <circle cx="36" cy="59" r="3"/>
      <circle cx="56" cy="50" r="3"/>
      <circle cx="76" cy="61" r="3"/>
      <circle cx="91" cy="50" r="3"/>
    </g>
    <path d="M53 21 C38 2 31 8 27 27 C42 27 49 26 53 21 Z M61 23 C77 3 85 12 83 30 C70 29 65 27 61 23 Z" fill="url(#leafGradient)"/>
    <text x="58" y="160" class="label">キュウリ</text>
  </g>

  <!-- Eggplant -->
  <g transform="translate(363 198)" filter="url(#softShadow)">
    <line class="stem" x1="52" y1="46" x2="52" y2="132"/>
    <path d="M55 36 C93 61 101 112 62 137 C28 159 -8 128 11 91 C25 65 35 52 55 36 Z" fill="url(#eggplantGradient)"/>
    <ellipse cx="38" cy="75" rx="10" ry="23" fill="#d9a8ff" opacity="0.35" transform="rotate(22 38 75)"/>
    <path d="M54 29 C43 20 31 21 21 33 C35 37 44 39 52 36 C62 44 77 45 88 38 C78 25 66 23 54 29 Z" fill="url(#leafGradient)"/>
    <path d="M56 30 C60 19 65 13 73 9" fill="none" stroke="#2e7d36" stroke-width="6" stroke-linecap="round"/>
    <text x="52" y="185" class="label">ナス</text>
  </g>

  <!-- Carrot -->
  <g transform="translate(493 183)" filter="url(#softShadow)">
    <line class="stem" x1="48" y1="77" x2="48" y2="145"/>
    <path d="M48 78 L89 181 L8 181 Z" fill="url(#carrotGradient)"/>
    <path d="M31 116 L62 107 M27 143 L71 132 M37 162 L62 154" stroke="#d45d1d" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <g fill="none" stroke="#2f9b42" stroke-width="6" stroke-linecap="round">
      <path d="M48 80 C38 55 19 39 11 18"/>
      <path d="M48 80 C47 49 47 27 43 7"/>
      <path d="M48 80 C60 52 72 35 86 16"/>
      <path d="M48 80 C31 62 28 45 27 28"/>
      <path d="M48 80 C66 63 71 47 70 27"/>
    </g>
    <text x="48" y="225" class="label">ニンジン</text>
  </g>

  <!-- Cabbage -->
  <g transform="translate(634 211)" filter="url(#softShadow)">
    <line class="stem" x1="58" y1="37" x2="58" y2="123"/>
    <circle cx="58" cy="73" r="54" fill="url(#cabbageGradient)"/>
    <path d="M21 73 C32 37 76 29 95 61 C84 49 69 51 58 74 C47 51 32 48 21 73 Z" fill="#a9e37f" opacity="0.82"/>
    <path d="M18 86 C38 70 77 69 99 87 C83 111 38 111 18 86 Z" fill="#74bc55" opacity="0.72"/>
    <path d="M58 24 C44 47 45 86 58 119 C72 87 72 47 58 24 Z" fill="#c4ef93" opacity="0.65"/>
    <path d="M23 72 C44 51 75 51 94 72 M20 90 C42 105 76 106 99 90 M58 27 C49 54 49 92 58 119" fill="none" stroke="#4f943e" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
    <text x="58" y="171" class="label">キャベツ</text>
  </g>

  <!-- Strawberry -->
  <g transform="translate(772 213)" filter="url(#softShadow)">
    <line class="stem" x1="43" y1="35" x2="43" y2="121"/>
    <path d="M43 51 C30 25 0 32 0 63 C0 94 34 109 43 133 C53 109 86 94 86 63 C86 32 57 25 43 51 Z" fill="url(#strawberryGradient)"/>
    <g class="seed">
      <ellipse cx="30" cy="65" rx="3" ry="5"/>
      <ellipse cx="55" cy="65" rx="3" ry="5"/>
      <ellipse cx="20" cy="85" rx="3" ry="5"/>
      <ellipse cx="43" cy="87" rx="3" ry="5"/>
      <ellipse cx="66" cy="85" rx="3" ry="5"/>
      <ellipse cx="32" cy="106" rx="3" ry="5"/>
      <ellipse cx="54" cy="106" rx="3" ry="5"/>
    </g>
    <path d="M43 42 L52 20 L57 45 L79 35 L61 54 L75 75 L50 64 L43 90 L36 64 L11 75 L25 54 L7 35 L29 45 L34 20 Z" fill="url(#leafGradient)"/>
    <ellipse cx="27" cy="55" rx="9" ry="16" fill="#ff9aa0" opacity="0.35" transform="rotate(24 27 55)"/>
    <text x="43" y="175" class="label">イチゴ</text>
  </g>
</svg>
